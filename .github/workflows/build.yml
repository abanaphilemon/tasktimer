name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 requests websockets

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name TaskTimer --icon=icon.ico main_cloud.py || pyinstaller --onefile --windowed --name TaskTimer main_cloud.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskTimer-Windows
          path: dist/TaskTimer.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 requests websockets
          sudo apt-get update
          sudo apt-get install -y libxcb-xinerama0 libxcb-cursor0

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name TaskTimer main_cloud.py

      - name: Create AppImage
        run: |
          mkdir -p TaskTimer.AppDir/usr/bin
          mkdir -p TaskTimer.AppDir/usr/share/applications
          mkdir -p TaskTimer.AppDir/usr/share/icons/hicolor/256x256/apps
          cp dist/TaskTimer TaskTimer.AppDir/usr/bin/
          cat > TaskTimer.AppDir/usr/share/applications/tasktimer.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=TaskTimer
          Comment=Task-Based Intelligent Time Tracking
          Exec=TaskTimer
          Icon=tasktimer
          Categories=Utility;
          EOF
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage TaskTimer.AppDir TaskTimer-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskTimer-Linux
          path: TaskTimer-x86_64.AppImage

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 requests websockets

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name TaskTimer --osx-bundle-id=com.tasktimer.app main_cloud.py

      - name: Create DMG
        run: |
          mkdir -p dmg/TaskTimer.app
          cp -r dist/TaskTimer.app dmg/
          hdiutil create -volname "TaskTimer" -srcfolder dmg -ov -format UDZO TaskTimer.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskTimer-macOS
          path: TaskTimer.dmg

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/TaskTimer-Windows/TaskTimer.exe
            artifacts/TaskTimer-Linux/TaskTimer-x86_64.AppImage
            artifacts/TaskTimer-macOS/TaskTimer.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
