name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 requests websockets pynput psutil pywin32

      - name: Build with PyInstaller
        run: |
          pyinstaller TaskTimer.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskTimer-Windows
          path: dist/TaskTimer.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 requests websockets pynput psutil
          sudo apt-get update
          sudo apt-get install -y libxcb-xinerama0 libxcb-cursor0

      - name: Build with PyInstaller
        run: |
          pyinstaller TaskTimer.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskTimer-Linux
          path: dist/TaskTimer

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 requests websockets pynput psutil

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name TaskTimer --osx-bundle-id=com.tasktimer.app main_cloud.py

      - name: Create DMG
        run: |
          mkdir -p dmg/TaskTimer.app
          cp -r dist/TaskTimer.app dmg/
          hdiutil create -volname "TaskTimer" -srcfolder dmg -ov -format UDZO TaskTimer.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskTimer-macOS
          path: TaskTimer.dmg

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/TaskTimer-Windows/TaskTimer.exe
            artifacts/TaskTimer-Linux/TaskTimer
            artifacts/TaskTimer-macOS/TaskTimer.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
