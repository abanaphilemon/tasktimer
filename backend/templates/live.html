<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskTimer Live</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .header .subtitle {
            color: #666;
            font-size: 14px;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .status-active {
            background: #10b981;
            color: white;
        }

        .status-idle {
            background: #f59e0b;
            color: white;
        }

        .status-paused {
            background: #ef4444;
            color: white;
        }

        .status-stopped {
            background: #6b7280;
            color: white;
        }

        .timer-display {
            text-align: center;
            margin: 30px 0;
        }

        .timer {
            font-size: 64px;
            font-weight: 700;
            color: #333;
            font-family: 'Courier New', monospace;
        }

        .task-name {
            font-size: 20px;
            color: #666;
            margin-top: 10px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        .info-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .info-card .label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .info-card .value {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .app-usage {
            margin-top: 30px;
        }

        .app-usage h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
        }

        .app-list {
            list-style: none;
        }

        .app-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .app-item:last-child {
            border-bottom: none;
        }

        .app-name {
            font-size: 14px;
            color: #333;
        }

        .app-duration {
            font-size: 14px;
            color: #666;
            font-family: 'Courier New', monospace;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #ef4444;
        }

        .connection-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }

        .connection-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
        }

        .connection-dot.disconnected {
            background: #ef4444;
        }

        .connection-dot.connecting {
            background: #f59e0b;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="app">
            <div class="loading">Loading...</div>
        </div>
    </div>

    <script>
        const app = document.getElementById('app');

        // Get share token from URL
        const pathParts = window.location.pathname.split('/');
        const shareToken = pathParts[pathParts.length - 1];

        let ws = null;
        let reconnectInterval = null;

        function formatDuration(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = Math.floor(seconds % 60);
            return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function getStatusClass(status) {
            switch (status) {
                case 'active': return 'status-active';
                case 'idle': return 'status-idle';
                case 'paused': return 'status-paused';
                default: return 'status-stopped';
            }
        }

        function render(data) {
            const statusClass = getStatusClass(data.status);

            app.innerHTML = `
                <div class="header">
                    <h1>🎯 TaskTimer Live</h1>
                    <div class="subtitle">Real-time work tracking</div>
                </div>

                <div style="text-align: center;">
                    <span class="status-badge ${statusClass}">${data.status}</span>
                </div>

                <div class="timer-display">
                    <div class="timer">${formatDuration(data.duration)}</div>
                    <div class="task-name">${data.task_name}</div>
                    ${data.total_time ? `<div style="font-size: 14px; color: #666; margin-top: 5px;">Total: ${formatDuration(data.total_time)}</div>` : ''}
                </div>

                <div class="info-grid">
                    <div class="info-card">
                        <div class="label">Current App</div>
                        <div class="value">${data.current_app || '--'}</div>
                    </div>
                    <div class="info-card">
                        <div class="label">Idle Time</div>
                        <div class="value">${Math.floor(data.idle_time || 0)}s</div>
                    </div>
                    <div class="info-card">
                        <div class="label">Viewers</div>
                        <div class="value">${data.viewer_count || 1}</div>
                    </div>
                    <div class="info-card">
                        <div class="label">Started</div>
                        <div class="value">${data.start_time ? new Date(data.start_time).toLocaleTimeString() : '--'}</div>
                    </div>
                </div>

                ${data.app_usage && data.app_usage.length > 0 ? `
                    <div class="app-usage">
                        <h3>Apps Used</h3>
                        <ul class="app-list">
                            ${data.app_usage.map(app => `
                                <li class="app-item">
                                    <span class="app-name">${app.app_name}</span>
                                    <span class="app-duration">${formatDuration(app.total_duration || app.duration || 0)}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                ` : ''}

                ${data.time_history && data.time_history.length > 0 ? `
                    <div class="app-usage">
                        <h3>Recent Sessions</h3>
                        <ul class="app-list">
                            ${data.time_history.slice(0, 5).map(entry => `
                                <li class="app-item">
                                    <span class="app-name">${entry.timestamp ? new Date(entry.timestamp).toLocaleString() : 'Unknown'}</span>
                                    <span class="app-duration">${formatDuration(entry.duration || 0)} (${entry.status || 'unknown'})</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                ` : ''}

                <div class="connection-status">
                    <div class="connection-dot" id="connectionDot"></div>
                    <span id="connectionText">Connected</span>
                </div>
            `;
        }

        function connectWebSocket() {
            //const wsUrl = `ws://${window.location.host}/ws/live/${shareToken}`;
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/live/${shareToken}`;
            ws = new WebSocket(wsUrl);

            const connectionDot = document.getElementById('connectionDot');
            const connectionText = document.getElementById('connectionText');

            if (connectionDot) {
                connectionDot.className = 'connection-dot connecting';
            }
            if (connectionText) {
                connectionText.textContent = 'Connecting...';
            }

            ws.onopen = () => {
                console.log('WebSocket connected');
                if (connectionDot) {
                    connectionDot.className = 'connection-dot';
                }
                if (connectionText) {
                    connectionText.textContent = 'Connected';
                }
                if (reconnectInterval) {
                    clearInterval(reconnectInterval);
                    reconnectInterval = null;
                }
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                console.log('Received:', data);

                if (data.type === 'connected') {
                    render(data);
                } else if (data.type === 'session_update') {
                    // Update with new data
                    const currentData = {
                        task_name: data.data.task_name || document.querySelector('.task-name')?.textContent || 'Unknown',
                        status: data.data.status || 'stopped',
                        duration: data.data.duration || 0,
                        current_app: data.data.current_app,
                        idle_time: data.data.idle_time,
                        viewer_count: data.data.viewer_count || 1,
                        start_time: data.data.start_time,
                        app_usage: data.data.app_usage || [],
                        total_time: data.data.total_time || 0,
                        time_history: data.data.time_history || []
                    };
                    render(currentData);
                } else if (data.type === 'session_started') {
                    // Update status to active
                    const timerEl = document.querySelector('.timer');
                    const statusEl = document.querySelector('.status-badge');
                    if (statusEl) {
                        statusEl.className = 'status-badge status-active';
                        statusEl.textContent = 'ACTIVE';
                    }
                } else if (data.type === 'session_stopped') {
                    // Update status to stopped
                    const statusEl = document.querySelector('.status-badge');
                    if (statusEl) {
                        statusEl.className = 'status-badge status-stopped';
                        statusEl.textContent = 'STOPPED';
                    }
                }
            };

            ws.onclose = () => {
                console.log('WebSocket disconnected');
                if (connectionDot) {
                    connectionDot.className = 'connection-dot disconnected';
                }
                if (connectionText) {
                    connectionText.textContent = 'Disconnected - Reconnecting...';
                }

                // Attempt to reconnect after 3 seconds
                if (!reconnectInterval) {
                    reconnectInterval = setInterval(() => {
                        console.log('Attempting to reconnect...');
                        connectWebSocket();
                    }, 3000);
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }

        // Load initial data
        async function loadInitialData() {
            try {
                const response = await fetch(`/api/live/${shareToken}`);
                if (!response.ok) {
                    throw new Error('Failed to load session');
                }
                const data = await response.json();
                render(data);

                // Connect WebSocket after initial data is loaded
                connectWebSocket();
            } catch (error) {
                console.error('Error loading session:', error);
                app.innerHTML = `
                    <div class="error">
                        <h2>Session Not Found</h2>
                        <p>This live link may have expired or is invalid.</p>
                    </div>
                `;
            }
        }

        // Start loading
        loadInitialData();

        // Send ping every 30 seconds to keep connection alive
        setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'ping' }));
            }
        }, 30000);
    </script>
</body>
</html>
